name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build (.NET 8 / Avalonia)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Verify output
        run: |
          test -f bin/Release/net8.0/cbr2cbz.dll \
            && echo "Build successful" \
            || (echo "Build failed — expected bin/Release/net8.0/cbr2cbz.dll" && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbr2cbz-dll
          path: bin/Release/net8.0/
          retention-days: 7
