name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build (Mono / GTK-sharp3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y mono-complete gtk-sharp3

      - name: Compile
        run: make build

      - name: Verify binary
        run: |
          test -f cbr2cbz.exe && echo "Build successful: cbr2cbz.exe" || (echo "Build failed" && exit 1)
          mono --version

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbr2cbz-exe
          path: cbr2cbz.exe
          retention-days: 7
